services:
  app:
    container_name: evnt
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Space-separated optional dependency groups. Leave empty for the
        # lean build. Example: EXTRAS: "apm sentry".
        EXTRAS: "${EVNT_BUILD_EXTRAS:-}"
        # Skip the Vue demo SPA build (saves the Node stage). The FastAPI
        # /demo mount still works (placeholder page) but EVNT_COMMON__DEMO
        # should be set to false at runtime in this case.
        BUILD_DEMO: "${EVNT_BUILD_DEMO:-true}"
    ports:
    - "8000:80"
    environment:
    - "EVNT_COMMON__DEMO=true"
    - "EVNT_INGEST__MODE=${EVNT_INGEST__MODE:-direct}"
    - "EVNT_LOGGING__LEVEL=DEBUG"
    restart: on-failure
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "80", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      clickhouse:
        condition: service_healthy
    develop:
      watch:
      - action: sync
        path: ./evnt
        target: /app/evnt
        ignore:
        - .venv/
        - __pycache__/
      - action: rebuild
        path: ./uv.lock

  worker:
    container_name: evnt-worker
    build:
      context: .
      dockerfile: Dockerfile
    environment:
    - "EVNT_LOGGING__LEVEL=DEBUG"
    restart: on-failure
    command: ["uv", "run", "python", "cli.py", "queue", "worker"]
    healthcheck:
      test: ["CMD", "uv", "run", "python", "cli.py", "queue", "healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles:
    - rabbitmq

  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server:26.3.4.11-alpine
    environment:
    - "CLICKHOUSE_PASSWORD=password"
    ports:
    - "8123:8123"
    - "9000:9000"
    - "9009:9009"
    volumes:
    # Mount individual files (not the whole directory) so we don't shadow the
    # image's docker_related_config.xml (which sets <listen_host>::</listen_host>)
    # nor block the entrypoint from writing users.d/default-user.xml.
    - ./deploy/clickhouse/config.d/cors.xml:/etc/clickhouse-server/config.d/cors.xml:ro
    - ./deploy/clickhouse/users.d/cors.xml:/etc/clickhouse-server/users.d/cors.xml:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--host", "localhost", "--port", "9000", "--user", "default", "--password", "password", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 12

  rabbitmq:
    container_name: evnt-rabbitmq
    image: rabbitmq:4.3-management-alpine
    ports:
    - "5672:5672"
    - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    profiles:
    - rabbitmq
