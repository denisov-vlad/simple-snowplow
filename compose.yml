services:
  app:
    container_name: simple-snowplow
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - "8001:80"
    environment:
    - "SNOWPLOW_COMMON__DEMO=true"
    - "SNOWPLOW_INGEST__MODE=${SNOWPLOW_INGEST__MODE:-direct}"
    - "SNOWPLOW_LOGGING__LEVEL=DEBUG"
    restart: on-failure
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "80", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      clickhouse:
        condition: service_healthy
    develop:
      watch:
      - action: sync
        path: ./simple_snowplow
        target: /app/simple_snowplow
        ignore:
        - .venv/
        - __pycache__/
      - action: rebuild
        path: ./uv.lock

  worker:
    container_name: simple-snowplow-worker
    build:
      context: .
      dockerfile: Dockerfile
    environment:
    - "SNOWPLOW_LOGGING__LEVEL=DEBUG"
    restart: on-failure
    command: ["uv", "run", "python", "cli.py", "queue", "worker"]
    healthcheck:
      test: ["CMD", "uv", "run", "python", "cli.py", "queue", "healthcheck"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    depends_on:
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles:
    - rabbitmq

  clickhouse:
    container_name: simple-snowplow-ch
    image: clickhouse/clickhouse-server:26.3.4.11-alpine
    environment:
    - "CLICKHOUSE_PASSWORD=password"
    ports:
    - "8123:8123"
    - "9000:9000"
    - "9009:9009"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--host", "localhost", "--port", "9000", "--user", "default", "--password", "password", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 12

  rabbitmq:
    container_name: simple-snowplow-rabbitmq
    image: rabbitmq:3.13-management-alpine
    ports:
    - "5672:5672"
    - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    profiles:
    - rabbitmq
